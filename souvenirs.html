<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Culture Générale - Terminale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .cursive { font-family: 'Dancing Script', cursive; }
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 192, 203, 0.3);
            transition: all 0.3s ease-in-out;
        }
        .cry-animation { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-rose-100 min-h-screen flex flex-col items-center py-10 px-4 relative">

    <a href="parcours.html" class="fixed top-6 left-6 flex items-center text-rose-500 hover:text-rose-700 transition-colors font-medium z-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Retour
    </a>

    <h1 class="text-4xl md:text-5xl font-bold text-rose-600 cursive mb-4 text-center">Défi Culture Bac 🎓</h1>
    <p class="text-rose-700 text-lg mb-8 text-center max-w-xl">
        Montre que tu es prête pour le Bac ! <br>
        <span class="text-sm font-normal">Score actuel : <span id="live-score" class="font-bold">0</span> / 6</span>
    </p>
    
    <div id="game-container" class="space-y-8 w-full max-w-md"></div>

    <div id="final-message" class="card p-8 rounded-3xl shadow-xl text-center mt-12 hidden opacity-0 transition-opacity duration-1000 w-full max-w-md">
        <div id="result-icon" class="text-6xl mb-4"></div>
        <h2 id="result-title" class="text-3xl font-bold text-rose-600 cursive mb-4"></h2>
        <p id="result-text" class="text-gray-700 text-lg mb-6"></p>
        <div class="bg-rose-100 py-3 rounded-xl mb-6">
            <p class="text-2xl font-bold text-rose-600">Score Final : <span id="final-score"></span> / 6</p>
        </div>
        <a href="parcours.html" class="inline-block bg-rose-500 text-white px-8 py-3 rounded-full shadow-lg hover:bg-rose-600 transition-all">Retour au voyage</a>
    </div>

    <script>
        const questions = [
            {
                question: "En quelle année a débuté la Révolution française ?",
                answer: "1789",
                clue: "C'est au 18ème siècle, l'année de la prise de la Bastille.",
                subject: "Histoire"
            },
            {
                question: "Qui a écrit 'L'Étranger' ?",
                answer: "albert camus",
                clue: "Un auteur pied-noir, prix Nobel de littérature.",
                subject: "Littérature"
            },
            {
                question: "Quel philosophe est l'auteur du concept de 'l'allégorie de la caverne' ?",
                answer: "platon",
                clue: "Le plus célèbre élève de Socrate.",
                subject: "Philosophie"
            },
            {
                question: "Quel est le symbole chimique de l'Or ?",
                answer: "au",
                clue: "Vient du latin 'Aurum'.",
                subject: "Sciences"
            },
            {
                question: "Quelle est la capitale de l'Australie ?",
                answer: "canberra",
                clue: "Ce n'est ni Sydney, ni Melbourne !",
                subject: "Géographie"
            },
            {
                question: "et pour terminer , Quelle est ton pire voisin dans ce quartier?",
                answer: "Armel",
                clue: "essaie mm pas de dire mon nom",
                subject: "bonus!😆"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let attempts = 0;

        function renderQuestion() {
            const container = document.getElementById('game-container');
            if (currentQuestionIndex >= questions.length) {
                showFinalMessage();
                return;
            }

            const q = questions[currentQuestionIndex];
            container.innerHTML = `
                <div class="card p-6 md:p-8 rounded-2xl shadow-lg border-rose-200 border transform transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-rose-100 text-rose-600 text-xs font-bold px-2 py-1 rounded uppercase">${q.subject}</span>
                        <span class="text-rose-400 text-sm">Question ${currentQuestionIndex + 1}/6</span>
                    </div>
                    <p class="text-gray-700 text-lg mb-6 font-medium">${q.question}</p>
                    <input type="text" id="answer-input" placeholder="Ta réponse..." 
                        class="w-full border-2 border-rose-200 rounded-xl px-4 py-3 mb-2 focus:outline-none focus:border-rose-500 transition-all">
                    <p class="text-xs text-rose-400 mb-4 ml-1 italic" id="attempts-left">Tentative : ${attempts + 1} / 2</p>
                    
                    <button id="btn-valider" class="w-full bg-rose-500 text-white py-3 rounded-xl font-bold shadow-md hover:bg-rose-600 transition-all active:scale-95">
                        Valider la réponse
                    </button>
                    
                    <button id="clue-btn" class="w-full mt-3 text-sm text-rose-400 hover:text-rose-600 underline italic">Indice ?</button>
                    <p id="clue-text" class="text-sm text-gray-500 mt-2 hidden text-center italic bg-white/50 p-2 rounded"></p>
                    <p id="feedback" class="mt-4 font-semibold text-center h-6"></p>
                </div>
            `;

            document.getElementById('btn-valider').onclick = checkAnswer;
            document.getElementById('answer-input').onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };
            document.getElementById('clue-btn').onclick = () => {
                document.getElementById('clue-text').textContent = q.clue;
                document.getElementById('clue-text').classList.toggle('hidden');
            };
            document.getElementById('answer-input').focus();
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');
            const q = questions[currentQuestionIndex];
            const userAnswer = input.value.toLowerCase().trim();

            if (userAnswer === q.answer.toLowerCase()) {
                score++;
                document.getElementById('live-score').textContent = score;
                feedback.innerHTML = "Excellent ! +1 point 🌟";
                feedback.className = "mt-4 text-green-500 font-bold animate-bounce";
                input.classList.add('border-green-400');
                proceed();
            } else {
                attempts++;
                if (attempts >= 2) {
                    feedback.innerHTML = "Dommage... On passe à la suivante ⏭️";
                    feedback.className = "mt-4 text-orange-500 font-bold";
                    input.classList.add('border-orange-400');
                    proceed();
                } else {
                    feedback.innerHTML = "Faux ! Dernière chance... 🔥";
                    feedback.className = "mt-4 text-red-400 font-bold animate-pulse";
                    input.value = "";
                    input.classList.add('border-red-400');
                    setTimeout(() => input.classList.remove('border-red-400'), 1000);
                    document.getElementById('attempts-left').textContent = "Tentative : 2 / 2";
                }
            }
        }

        function proceed() {
            document.getElementById('btn-valider').disabled = true;
            setTimeout(() => {
                attempts = 0;
                currentQuestionIndex++;
                renderQuestion();
            }, 1500);
        }

        function showFinalMessage() {
            document.getElementById('game-container').classList.add('hidden');
            const final = document.getElementById('final-message');
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            
            document.getElementById('final-score').textContent = score;
            final.classList.remove('hidden');
            setTimeout(() => final.classList.remove('opacity-0'), 100);

            if (score > 3) {
                // VICTOIRE - FEUX D'ARTIFICE
                icon.innerHTML = "👑";
                title.innerHTML = "Bravo Alexia !";
                text.innerHTML = "Tu es plus que prête pour le Bac. Une vraie championne !";
                launchFireworks();
            } else if (score === 3) {
                // MOYENNE - FELICITATIONS
                icon.innerHTML = "⚖️";
                title.innerHTML = "Pas mal !";
                text.innerHTML = "Tu as la moyenne, mais je sais que tu peux faire encore mieux !";
            } else {
                // ECHEC - PLEURS
                icon.innerHTML = "😭";
                icon.classList.add('cry-animation');
                title.innerHTML = "Oh non...";
                text.innerHTML = "Le Bac approche, il va falloir réviser un peu plus avec moi !";
            }
        }

        function launchFireworks() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }

        window.onload = renderQuestion;
    </script>
</body>
</html>
