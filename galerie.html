<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie U17 - Alexia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fff5f7; }
        .cursive { font-family: 'Dancing Script', cursive; }
        
        /* Animation d'apparition au chargement */
        .gallery-item {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInScale 0.6s ease-out forwards;
        }

        @keyframes fadeInScale {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Effet de brillance au survol */
        .img-container::after {
            content: '';
            position: absolute;
            top: 0; left: -75%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .img-container:hover::after { left: 125%; }
    </style>
</head>
<body class="p-4 md:p-10">

    <a href="parcours.html" class="fixed top-6 left-6 z-50 bg-white/80 backdrop-blur-md p-2 rounded-full shadow-lg text-rose-500 hover:scale-110 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
    </a>

    <header class="text-center mb-12">
        <h1 class="text-5xl font-bold text-rose-600 cursive mb-2">Instantclichés</h1>
        <p class="text-rose-400 italic">Quelques morceaux de nous... et de tes bêtises.</p>
    </header>

    <div class="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4 max-w-6xl mx-auto">
        
        <div class="gallery-item break-inside-avoid" style="animation-delay: 0.1s">
            <div class="relative group img-container overflow-hidden rounded-2xl cursor-pointer" onclick="openLightbox(this.querySelector('img').src, 'Le jour où on ne s\'est pas disputés... miracle !')">
                <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?auto=format&fit=crop&w=500&q=80" class="w-full hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-rose-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                    <p class="text-white text-sm font-medium">Clique pour voir ❤️</p>
                </div>
            </div>
        </div>

        <div class="gallery-item break-inside-avoid" style="animation-delay: 0.2s">
            <div class="relative group img-container overflow-hidden rounded-2xl cursor-pointer" onclick="openLightbox(this.querySelector('img').src, 'Ta tête quand je te contredis encore.')">
                <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=500&q=80" class="w-full hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-rose-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                    <p class="text-white text-sm font-medium">Inoubliable ✨</p>
                </div>
            </div>
        </div>

        <div class="gallery-item break-inside-avoid" style="animation-delay: 0.3s">
            <div class="relative group img-container overflow-hidden rounded-2xl cursor-pointer" onclick="openLightbox(this.querySelector('img').src, 'Toujours à fond dans tes projets !')">
                <img src="https://images.unsplash.com/photo-1523240693567-510e809b9281?auto=format&fit=crop&w=500&h=700&q=80" class="w-full hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-rose-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                    <p class="text-white text-sm font-medium">Ma championne 🏆</p>
                </div>
            </div>
        </div>

        </div>

    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col items-center justify-center p-4" onclick="closeLightbox()">
        <span class="absolute top-10 right-10 text-white text-4xl cursor-pointer">&times;</span>
        <img id="lightbox-img" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl transition-all duration-300 scale-90">
        <p id="lightbox-caption" class="text-white mt-6 text-xl cursive text-center"></p>
    </div>

    <script>
        function openLightbox(src, caption) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const cap = document.getElementById('lightbox-caption');
            
            img.src = src;
            cap.innerText = caption;
            lb.classList.remove('hidden');
            lb.classList.add('flex');
            
            // Animation d'entrée
            setTimeout(() => {
                img.classList.remove('scale-90');
                img.classList.add('scale-100');
            }, 10);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.classList.add('scale-90');
            setTimeout(() => {
                lb.classList.add('hidden');
                lb.classList.remove('flex');
            }, 200);
        }
    </script>
</body>
</html>
