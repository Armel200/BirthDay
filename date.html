<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forever Together 💞</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-12px) rotate(2deg); }
    }
    @keyframes gentle-pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.08); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .heart-float {
      position: absolute;
      font-size: 1.8rem;
      opacity: 0.6;
      pointer-events: none;
      animation: float 10s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.7));
    }
    .heart-float:nth-child(odd)  { animation-duration: 14s; animation-delay: -4s; }
    .heart-float:nth-child(even) { animation-duration: 12s; animation-delay: -8s; }
    .polaroid {
      transition: all 0.4s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      cursor: pointer;
    }
    .polaroid:hover {
      transform: scale(1.08) rotate(0deg) !important;
      box-shadow: 0 20px 40px rgba(255, 105, 180, 0.4);
    }
    .glow-heart {
      animation: gentle-pulse 3s ease-in-out infinite;
    }
  </style>
</head>


  <body class="min-h-screen px-4 py-8 flex items-center justify-center 
  bg-gradient-to-br from-rose-200 via-pink-300 to-red-300 
  relative overflow-auto">


  <!-- Cœurs flottants -->
  <div class="absolute inset-0 pointer-events-none select-none">
    <span class="heart-float top-[10%] left-[8%]">💗</span>
    <span class="heart-float top-[20%] right-[12%]">💖</span>
    <span class="heart-float bottom-[25%] left-[15%]">❤️</span>
    <span class="heart-float top-[55%] right-[18%]">💕</span>
    <span class="heart-float bottom-[15%] left-[22%]">💞</span>
  </div>

  <!-- CARD principale -->
  <div class="relative w-full max-w-lg bg-white/30 backdrop-blur-xl 
    rounded-3xl shadow-2xl p-6 md:p-10 border border-white/40 overflow-hidden
    animate-[fadeIn_1.2s_ease-out]">

    <!-- TITRE -->
    <h1 class="text-center text-3xl md:text-4xl font-extrabold text-red-600 
      tracking-wider mb-8 drop-shadow-lg"
      style="text-shadow: 0 0 15px rgba(255, 105, 180, 0.6);">
      Forever Together 💞
    </h1>

    <!-- CONTENU -->
    <div class="flex flex-col md:flex-row gap-6 md:gap-8 items-center">

      <!-- PHOTOS sélectionnables -->
      <div class="flex flex-row md:flex-col gap-6 md:gap-8">
        <label class="polaroid bg-white p-3 rounded-xl shadow-lg rotate-[-4deg] hover:rotate-0">
          <input type="file" accept="image/*" class="hidden" onchange="previewImage(event, 0)" />
          <img id="preview-0" src="https://thumbs.dreamstime.com/b/couple-holding-hands-golden-hour-light-380838695.jpg"
            alt="Couple" class="w-32 md:w-40 h-40 md:h-52 object-cover rounded-lg" />
        </label>

        <label class="polaroid bg-white p-3 rounded-xl shadow-lg rotate-[4deg] hover:rotate-0">
          <input type="file" accept="image/*" class="hidden" onchange="previewImage(event, 1)" />
          <img id="preview-1" src="https://thumbs.dreamstime.com/b/couple-holding-hands-watching-sunset-beach-couple-holding-hands-watching-sunset-beach-silhouette-romantic-young-couple-429442549.jpg"
            alt="Couple" class="w-32 md:w-40 h-40 md:h-52 object-cover rounded-lg" />
        </label>
      </div>

      <!-- MESSAGE -->
      <div class="flex-1 relative animate-[fadeIn_1.5s_ease-out_0.3s] opacity-0 [animation-fill-mode:forwards]">
        <div class="bg-[#fff5e6] rounded-2xl p-6 md:p-8 shadow-inner text-base md:text-lg text-gray-800 
          leading-relaxed italic relative border border-[#ffe4c4]/70">
          <div class="absolute -top-3 left-8 w-14 h-5 bg-gray-400/50 rounded-sm rotate-[-6deg] shadow"></div>
          <div class="absolute -bottom-3 right-10 w-12 h-4 bg-gray-300/60 rounded-sm rotate-[8deg] shadow"></div>
          <p>
            My world shines brighter<br>
            every time you're near 💫<br><br>
            Your laugh is my favorite melody,<br>
            your touch my safest place.<br>
            Every single second with you<br>
            becomes a treasure I keep forever.<br><br>
            <span class="text-red-600 font-semibold not-italic block mt-4 text-xl">
              I love you endlessly, mon cœur ❤️
            </span>
          </p>
        </div>
      </div>
    </div>

    <!-- MASCOTTE -->
    <div class="absolute bottom-6 left-6 md:bottom-10 md:left-10 text-5xl md:text-6xl glow-heart">
      <span>🐻‍❄️</span>
      <span class="absolute -top-4 -right-4 text-2xl">💞</span>
    </div>

    <!-- BOUTON -->
    <div class="mt-10 text-center">
      <a href="second.html"
         class="inline-block bg-gradient-to-r from-red-500 to-pink-500 
         hover:from-red-600 hover:to-pink-600 transition-all duration-300 
         text-white px-8 py-3 rounded-full shadow-xl font-medium text-lg
         transform hover:scale-105 hover:shadow-2xl">
        ← Retour à toi 💕
      </a>
    </div>

  </div>

  <script>
    function previewImage(event, index) {
      const file = event.target.files[0];
      if (!file) return;
      const img = document.getElementById(`preview-${index}`);
      img.src = URL.createObjectURL(file);
    }
  </script>
</body>
</html>
