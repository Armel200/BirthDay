<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forever Together 💞</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-pink-100 px-4">

  <!-- CARD PRINCIPALE -->
  <div class="relative w-full max-w-md bg-[#fde8ec] rounded-3xl shadow-xl p-6 overflow-hidden">

    <!-- Coeurs décoratifs -->
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute top-3 left-4">❤️</div>
      <div class="absolute top-10 right-6">❤️</div>
      <div class="absolute bottom-8 left-8">❤️</div>
      <div class="absolute bottom-4 right-10">❤️</div>
    </div>

    <!-- TITRE -->
    <h1 class="text-center text-red-500 font-bold tracking-widest mb-6">
      FOREVER TOGETHER
    </h1>

    <!-- CONTENU -->
    <div class="flex gap-4">

      <!-- PHOTOS -->
      <div class="flex flex-col gap-4">
        <div class="bg-white p-2 rounded-xl shadow-md rotate-[-3deg]">
          <img
            src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"
            alt="couple"
            class="w-28 h-36 object-cover rounded-lg"
          />
        </div>

        <div class="bg-white p-2 rounded-xl shadow-md rotate-[3deg]">
          <img
            src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"
            alt="couple"
            class="w-28 h-36 object-cover rounded-lg"
          />
        </div>
      </div>

      <!-- MESSAGE -->
      <div class="flex-1 relative">
        <div class="bg-[#fff8dc] rounded-xl p-4 shadow-md text-sm text-gray-700 relative">

          <!-- scotch -->
          <div class="absolute -top-3 left-6 w-12 h-4 bg-gray-300/60 rounded-sm rotate-[-5deg]"></div>

          <p class="leading-relaxed">
            My world is brighter  
            because of you 💕  
            <br><br>
            Every smile, every laugh,  
            every moment together  
            is my favorite memory.
            <br><br>
            I love you forever ❤️
          </p>
        </div>
      </div>
    </div>

    <!-- MASCOTTE -->
    <div class="absolute bottom-4 left-4 text-4xl">
      🐻‍❄️
    </div>

    <!-- BOUTON RETOUR -->
    <div class="mt-6 text-center">
      <a href="second.html"
         class="inline-block bg-red-500 hover:bg-red-600 transition text-white px-6 py-2 rounded-full shadow-md">
        ← Retour
      </a>
    </div>

  </div>

</body>
</html>
