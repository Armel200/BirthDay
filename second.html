<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tu as dit oui… 💞 Mon cœur explose !</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes float-heart {
      0% { transform: translateY(120vh) scale(0.4) rotate(0deg); opacity: 0; }
      10% { opacity: 0.9; }
      100% { transform: translateY(-20vh) scale(1) rotate(720deg); opacity: 0; }
    }
    @keyframes float-rose {
      0% { transform: translateY(120vh) scale(0.5) rotate(-15deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-30vh) scale(1) rotate(1080deg); opacity: 0; }
    }
    @keyframes gentle-sway {
      0%,100% { transform: rotate(0deg); }
      50% { transform: rotate(3deg); }
    }
    .heart-float, .rose-float {
      position: absolute;
      pointer-events: none;
      animation-timing-function: linear;
    }
    .heart-float { animation-name: float-heart; }
    .rose-float { animation-name: float-rose; }
    .card-hover {
      transition: all .4s cubic-bezier(.34,1.56,.64,1);
    }
    .card-hover:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 25px 50px rgba(244,63,94,.5);
    }
    .glow-text {
      text-shadow: 0 0 25px rgba(244,63,94,.8);
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-rose-400 via-pink-500 to-red-500 relative overflow-x-hidden">

  <!-- Motif fond -->
  <div class="absolute inset-0 opacity-10 pointer-events-none"
    style="background-image:
      radial-gradient(circle at 20% 20%, white 1px, transparent 1px),
      radial-gradient(circle at 80% 40%, white 1px, transparent 1px),
      radial-gradient(circle at 50% 80%, white 1.5px, transparent 1.5px);
      background-size: 70px 70px;">
  </div>

  <!-- Particules -->
  <div id="floaters" class="absolute inset-0 pointer-events-none"></div>

  <!-- CONTENU -->
  <main class="relative z-10 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-2xl
                rounded-3xl p-6 md:p-12 shadow-2xl
                border border-white/20 text-center">

      <!-- Badge -->
      <div class="inline-block mb-8 bg-gradient-to-r from-pink-500 to-rose-500
                  text-white px-6 py-2 rounded-full font-bold shadow-lg rotate-[-3deg]">
        💍 Elle a dit OUI !
      </div>

      <!-- Illustration -->
      <div class="relative mx-auto w-28 md:w-36 mb-8">
        <img src="./src/assets/images/heart-removebg-preview.png"
             class="animate-[gentle-sway_6s_ease-in-out_infinite] mx-auto drop-shadow-2xl">
      </div>

      <!-- Titre -->
      <h1 class="text-4xl md:text-6xl font-extrabold text-white glow-text mb-12">
        Mon cœur bat pour toi…<br>
        <span class="text-rose-200 text-3xl md:text-4xl font-semibold">
          Tu as dit oui 💞
        </span>
      </h1>

      <!-- Cartes -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">

        <a href="date.html" class="card-hover bg-white/15 rounded-2xl p-6 border border-white/20">
          <div class="text-4xl mb-3">🏩</div>
          <span class="text-white font-semibold">Notre date</span>
        </a>

        <a href="message.html" class="card-hover bg-white/15 rounded-2xl p-6 border border-white/20">
          <div class="text-4xl mb-3">💌</div>
          <span class="text-white font-semibold">Mot doux</span>
        </a>

        <a href="gift.html" class="card-hover bg-white/15 rounded-2xl p-6 border border-white/20">
          <div class="text-4xl mb-3">🎁</div>
          <span class="text-white font-semibold">Surprise</span>
        </a>

      </div>

      <!-- Footer -->
      <p class="text-white/80 italic">
        Ensemble pour toujours… 💕 2026 & beyond
      </p>

    </div>
  </main>

  <script>
    const floaters = document.getElementById("floaters");
    const emojis = ['❤️','💖','💗','💞','💘','🌹','🌸','✨'];

    function createFloatingItem() {
      const el = document.createElement("div");
      const isHeart = Math.random() > 0.4;
      el.className = isHeart ? "heart-float" : "rose-float";
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.fontSize = 1.6 + Math.random() * 1.6 + "rem";
      const duration = 10 + Math.random() * 10;
      el.style.animationDuration = duration + "s";
      floaters.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000 + 2000);
    }

    for(let i=0;i<12;i++) createFloatingItem();
    setInterval(createFloatingItem, 500);
  </script>

</body>
</html>
