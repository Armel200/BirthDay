<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Surprise U17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .cursive { font-family: 'Dancing+Script', cursive; }
    </style>
</head>
<body class="bg-rose-50 min-h-screen flex items-center justify-center p-6 text-center">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-rose-100">
        <h2 class="text-2xl font-bold text-rose-600 mb-6 italic">L'Énigme </h2>
        
        <p class="text-gray-600 mb-8 italic">
            "Rouge à l'extérieur, parsemée de petits points noirs, je suis le fruit qui rime avec ton sourire. Sous mon chapeau vert, je cache un cœur sucré. On me déguste souvent en boîte pour un plaisir partagé. Qui suis-je ?"
        </p>

        <input type="text" id="answer" placeholder="Ta réponse..." class="w-full border-2 border-rose-200 rounded-xl px-4 py-10 mb-4 focus:outline-none focus:border-rose-500">
        
        <button onclick="checkAnswer()" class="w-full bg-rose-500 text-white py-3 rounded-xl font-bold shadow-md hover:bg-rose-600">Valider</button>
        
        <p id="feedback" class="mt-4 font-semibold"></p>
        
        <a href="parcours.html" class="inline-block mt-8 text-rose-400 hover:text-rose-600 text-sm underline">Retour</a>
    </div>

    
</body>
<script>
        function checkAnswer() {
            const val = document.getElementById('answer').value.toLowerCase().trim();
            const feedback = document.getElementById('feedback');
            
            if(val.includes("fraise")) {
                feedback.innerHTML = "OUI ! Tu as trouvéééé ! 🎉🍓";
                feedback.className = "mt-4 text-green-500 animate-bounce";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fb7185', '#ffffff'] });
            } else {
                feedback.innerHTML = "Mmmh, non... Réessaie encore ! 🧐";
                feedback.className = "mt-4 text-red-400";
            }
        }
    </script>
</html>
