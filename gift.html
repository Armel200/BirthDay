<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love Song 💖</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center
bg-gradient-to-br from-rose-300 via-pink-300 to-red-300
relative overflow-hidden px-4">

  <!-- Motifs flottants -->
  <div class="absolute inset-0 pointer-events-none opacity-20
    bg-[radial-gradient(circle_at_20%_30%,white_2px,transparent_2px),
        radial-gradient(circle_at_80%_40%,white_2px,transparent_2px),
        radial-gradient(circle_at_50%_80%,white_2px,transparent_2px)]
    bg-[length:60px_60px]">
  </div>

  <!-- Cœurs animés -->
  <div class="absolute inset-0 pointer-events-none">
    <span class="absolute top-10 left-10 text-2xl animate-pulse">❤️</span>
    <span class="absolute top-24 right-14 text-xl animate-bounce">💖</span>
    <span class="absolute bottom-20 left-16 text-xl animate-pulse">💕</span>
    <span class="absolute bottom-12 right-10 text-2xl animate-bounce">❤️</span>
  </div>

  <!-- Cadre principal -->
  <div class="relative z-10 w-full max-w-4xl
    bg-white/20 backdrop-blur-xl
    rounded-3xl shadow-2xl p-6 md:p-8
    border border-white/40">

    <!-- Sticker -->
    <div class="absolute -top-5 left-1/2 -translate-x-1/2
      bg-white text-red-500 px-5 py-1 rounded-full
      font-semibold shadow-md rotate-[-2deg]">
      🎶 Love Vibes
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">

      <!-- GAUCHE -->
      <div class="relative bg-gradient-to-br from-red-400 to-pink-400
        rounded-2xl p-6 text-center text-white shadow-inner">

        <div class="absolute top-4 left-4 text-4xl">☁️</div>
        <div class="absolute top-6 right-6 text-4xl">☁️</div>

        <div class="text-6xl mb-4 drop-shadow-lg">
          🌸🌺🌸
        </div>

        <div class="bg-white/20 rounded-xl py-4 px-6 shadow-md backdrop-blur">
          <p class="font-extrabold text-xl tracking-wide drop-shadow">
            I LOVE YOU ❤️
          </p>
        </div>

        <p class="mt-4 italic text-sm text-white/90">
          Forever & always 💍
        </p>

        <div class="absolute bottom-4 left-4 text-2xl animate-pulse">❤️</div>
        <div class="absolute bottom-6 right-6 text-2xl animate-bounce">💖</div>
      </div>

      <!-- DROITE -->
      <div class="bg-gradient-to-br from-red-500 to-rose-500
        rounded-2xl p-4 text-white shadow-xl">

        <!-- YouTube -->
        <div class="relative w-full aspect-video rounded-xl overflow-hidden
          shadow-2xl ring-4 ring-white/30">
          <iframe
            class="w-full h-full"
            src="https://www.youtube.com/embed/2Vv-BfVoq4g?rel=0&modestbranding=1"
            title="Young Kai - Blue"
            allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>

        <p class="mt-4 text-center text-sm italic text-white/90">
          🎧 Young Kai – <span class="font-semibold">Blue</span><br>
          This song is just for you 💕
        </p>
      </div>
    </div>

    <!-- Retour -->
    <div class="mt-6 text-center">
      <a href="second.html"
         class="inline-block bg-white text-red-500
         hover:bg-red-500 hover:text-white
         transition px-6 py-2 rounded-full shadow-md">
        ← Retour
      </a>
    </div>

  </div>

</body>
</html>
