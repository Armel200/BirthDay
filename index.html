<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Alexia U17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .cursive { font-family: 'Dancing+Script', cursive; }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex flex-col items-center justify-center overflow-hidden relative">

    <div class="absolute top-10 left-10 w-32 h-32 bg-pink-200 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
    <div class="absolute bottom-10 right-10 w-32 h-32 bg-rose-200 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>

    <div class="z-10 text-center px-4">
        <h2 id="typewriter1" class="text-2xl text-rose-400 font-light mb-2 h-8"></h2>
        <h1 id="typewriter2" class="text-4xl md:text-6xl font-bold text-rose-600 cursive mb-8"></h1>

        <div id="btn-container" class="opacity-0 transition-opacity duration-1000">
            <a href="parcours.html" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-full shadow-lg transform transition hover:scale-105 inline-block font-semibold">
                Continuer le voyage ✨
            </a>
        </div>
    </div>

    <script>
        const text1 = "Bonjourr U17...";
        const text2 = "Joyeux Anniversaire Alexia 🎉!";
        
        function typeWriter(text, elementId, speed, callback) {
            let i = 0;
            const elem = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    elem.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        // Lancement de la séquence
        window.onload = () => {
            typeWriter(text1, "typewriter1", 100, () => {
                setTimeout(() => {
                    typeWriter(text2, "typewriter2", 100, () => {
                        // Explosion de joie !
                        launchFirework();
                        document.getElementById('btn-container').classList.remove('opacity-0');
                    });
                }, 500);
            });
        };

        function launchFirework() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
