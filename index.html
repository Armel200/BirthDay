<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Alexia U17 & Joyeuses Pâques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .cursive { font-family: 'Dancing+Script', cursive; }
        
        /* Animations douces pour les éléments de Pâques */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-item { animation: float 6s ease-in-out infinite; }
        .delay-1 { animation-delay: 1.5s; }
        .delay-2 { animation-delay: 3s; }
        .delay-3 { animation-delay: 4.5s; }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex flex-col items-center justify-center overflow-hidden relative">

    <audio id="bg-music" loop>
        <source src="./src/assets/images/deos.MP4" type="video/mp4">
    </audio>

   <div id="start-screen" class="fixed inset-0 bg-pink-100/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        
        <div class="animate-bounce text-rose-500 mb-6 text-xl flex flex-col items-center">
            <span class="font-bold cursive tracking-wider text-3xl mb-2 text-rose-600">Ohhh!</span>
            <span class="text-4xl">👇</span>
        </div>

        <div class="relative">
            <span class="absolute top-0 left-0 w-full h-full rounded-full bg-rose-400 opacity-60 animate-ping"></span>
            
            <button onclick="startSurprise()" class="relative z-10 bg-rose-500 hover:bg-rose-600 text-white px-6 py-3 rounded-full shadow-2xl transform transition-all duration-300 hover:scale-110 active:scale-95 text-[16px] font-semibold flex items-center gap-3 border-2 border-rose-300">
                vas y clique dessus mann <span class="text-2xl animate-pulse">🎁</span>
            </button>
        </div>
        
    </div>

    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[20%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center opacity-[0.07] w-full whitespace-nowrap select-none">
            <h1 class="lg:text-7xl text-[35px] md:text-[10rem] cursive text-rose-600">Joyeuses Pâques</h1>
        </div>
        
        <div class="absolute top-16 left-12 text-5xl opacity-30 floating-item">🥚</div>
        <div class="absolute bottom-24 left-1/4 text-6xl opacity-30 floating-item delay-1">🧺</div>
        <div class="absolute top-1/4 right-16 text-6xl opacity-20 floating-item delay-2">🐰</div>
        <div class="absolute bottom-16 right-24 text-5xl opacity-30 floating-item delay-3">🐣</div>
        <div class="absolute top-1/3 left-1/3 text-4xl opacity-20 floating-item">🍫</div>
    </div>

    <div class="absolute top-10 right-1/4 w-32 h-32 bg-pink-200 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
    <div class="absolute bottom-1/4 left-10 w-32 h-32 bg-rose-200 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob" style="animation-delay: 2s;"></div>

    <div class="z-10 text-center px-4 relative">
        <h2 id="typewriter1" class="text-2xl text-rose-500 font-medium mb-2 h-8"></h2>
        <h1 id="typewriter2" class="text-4xl md:text-6xl font-bold text-rose-600 cursive mb-8 h-12 md:h-16"></h1>

        <div id="btn-container" class="opacity-0 transition-opacity duration-1000">
            <a href="parcours.html" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-full shadow-lg transform transition hover:scale-105 inline-block font-semibold">
                Continuer le voyage ✨
            </a>
        </div>
    </div>

    <script>
        const text1 = "Bonjourrr....";
        const text2 = "Joyeux Anniversaire Alexia 🎉!";
        
        function typeWriter(text, elementId, speed, callback) {
            let i = 0;
            const elem = document.getElementById(elementId);
            elem.innerHTML = ''; // Sécurité : on vide le texte avant
            function type() {
                if (i < text.length) {
                    elem.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        // Fonction déclenchée quand on clique sur le bouton de démarrage
        function startSurprise() {
            // 1. Lancer la musique
            const music = document.getElementById('bg-music');
            music.volume = 1; // Optionnel : met le son à 50% pour ne pas agresser les oreilles
            music.play().catch(error => console.log("L'audio a été bloqué.", error));

            // 2. Faire disparaître l'écran d'accueil en douceur
            const startScreen = document.getElementById('start-screen');
            startScreen.classList.add('opacity-0');
            
            setTimeout(() => {
                startScreen.classList.add('hidden'); // Le retirer complètement
                
                // 3. Lancer ton animation de texte originelle
                typeWriter(text1, "typewriter1", 100, () => {
                    setTimeout(() => {
                        typeWriter(text2, "typewriter2", 100, () => {
                            // Explosion de joie !
                            launchFirework();
                            document.getElementById('btn-container').classList.remove('opacity-0');
                        });
                    }, 500);
                });
            }, 1000); // Temps de la transition (1s)
        }

        function launchFirework() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 20 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
