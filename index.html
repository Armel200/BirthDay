<!DOCTYPE html>
<html lang="fr" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Alexia U17 & Joyeuses Pâques</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        cursive: ['"Dancing Script"', 'cursive'],
                    },
                    colors: {
                        rose: {
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float-slow': 'float 8s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 10px rgba(244, 63, 94, 0.5))' },
                            '50%': { opacity: .7, filter: 'drop-shadow(0 0 20px rgba(244, 63, 94, 0.8))' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Utilitaires avancés */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        /* Curseur machine à écrire */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #e11d48; /* rose-600 */
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* Suppression des scrolls bar (Clean UI) */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-rose-50 min-h-screen flex flex-col items-center justify-center overflow-hidden relative selection:bg-rose-200 selection:text-rose-900">

    <audio id="bg-music" loop preload="auto">
        <source src="./src/assets/images/deos.MP4" type="audio/mp4">
        </audio>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute top-[40%] left-[20%] w-72 h-72 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob" style="animation-delay: 4s;"></div>
    </div>

    <div class="absolute top-[20%] left-[5%]  inset-0 pointer-events-none  z-0 opacity-[0.03]">
        <h1 class="text-[15vw] font-cursive whitespace-nowrap text-rose-900 select-none">Joyeuses Pâques</h1>
    </div>

    <div id="floating-elements-container" class="absolute inset-0 pointer-events-none z-0"></div>

    <div id="start-screen" class="fixed inset-0 bg-pink-100/95 backdrop-blur-sm  z-50 flex flex-col items-center justify-center transition-all duration-1000 ease-[cubic-bezier(0.4,0,0.2,1)]">
        
        <div class="animate-bounce text-rose-500 mb-8 flex flex-col items-center">
            <span class="font-bold font-cursive tracking-widest text-4xl mb-3 text-rose-600 drop-shadow-sm">Ohhh!</span>
            <span class="text-4xl filter drop-shadow-md">👇</span>
        </div>

        <div class="relative group cursor-pointer">
            <div class="absolute -inset-1 bg-gradient-to-r from-rose-400 to-pink-500 rounded-full blur opacity-40 group-hover:opacity-75 transition duration-500 animate-pulse"></div>
            <button onclick="App.init()" class="relative z-10 glass hover:bg-white/40 text-rose-700 px-8 py-4 rounded-full shadow-xl transform transition-all duration-300 hover:scale-105 active:scale-95 text-lg font-semibold flex items-center gap-3">
                Vas y clique dessus mann <span class="text-3xl animate-pulse">🎁</span>
            </button>
        </div>
        
    </div>

    <main class="z-10 text-center px-4 relative max-w-4xl w-full flex flex-col items-center justify-center min-h-[50vh]">
        
        <div class="h-32 md:h-48 flex flex-col items-center justify-center w-full">
            <h2 id="typewriter1" class="text-2xl md:text-3xl text-rose-500/80 font-medium mb-2 tracking-wide"></h2>
            <h1 id="typewriter2" class="text-4xl md:text-7xl font-bold text-rose-600 font-cursive leading-tight filter drop-shadow-[0_2px_4px_rgba(225,29,72,0.2)]"></h1>
        </div>

        <div id="btn-container" class="opacity-0 translate-y-4 transition-all duration-1000 ease-out mt-8">
            <a href="parcours.html" class="group relative inline-flex items-center justify-center overflow-hidden rounded-full p-4 px-8 font-medium text-white bg-rose-500 hover:bg-rose-600 shadow-[0_8px_30px_rgb(225,29,72,0.3)] transition-all hover:shadow-[0_8px_30px_rgb(225,29,72,0.5)] hover:-translate-y-1">
                <span class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></span>
                <span class="relative flex items-center gap-2 text-lg">
                    Continuer le voyage ✨
                </span>
            </a>
        </div>
    </main>

    <script>
        /**
         * Architecture Orientée Objet "Clean Code"
         * Évite la pollution de l'espace global
         */
        const App = (() => {
            // Configuration
            const CONFIG = {
                texts: {
                    intro: "Bonjourrr....",
                    main: "Joyeux Anniversaire Alexia 🎉!"
                },
                typingSpeed: 80,
                emojis: ['🥚', '🧺', '🐰', '🐣', '🍫', '🌸', '✨'],
                audioFadeStep: 0.05
            };

            // DOM Elements
            const DOM = {
                screen: document.getElementById('start-screen'),
                tw1: document.getElementById('typewriter1'),
                tw2: document.getElementById('typewriter2'),
                btn: document.getElementById('btn-container'),
                audio: document.getElementById('bg-music'),
                floatingContainer: document.getElementById('floating-elements-container')
            };

            /**
             * Génère les éléments flottants en arrière-plan dynamiquement
             */
            const generateFloatingElements = () => {
                const count = window.innerWidth < 768 ? 6 : 12; // Moins sur mobile
                
                for(let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    const emoji = CONFIG.emojis[Math.floor(Math.random() * CONFIG.emojis.length)];
                    
                    // Propriétés aléatoires
                    const size = Math.random() * 2 + 2; // 2rem to 4rem
                    const left = Math.random() * 100; // 0 to 100%
                    const top = Math.random() * 100; // 0 to 100%
                    const delay = Math.random() * 5; // 0 to 5s
                    const duration = Math.random() * 4 + 6; // 6 to 10s
                    const opacity = Math.random() * 0.2 + 0.1; // 0.1 to 0.3

                    el.textContent = emoji;
                    el.className = 'absolute animate-float-slow select-none';
                    el.style.cssText = `
                        font-size: ${size}rem;
                        left: ${left}%;
                        top: ${top}%;
                        opacity: ${opacity};
                        animation-delay: ${delay}s;
                        animation-duration: ${duration}s;
                        filter: blur(${Math.random() * 2}px);
                    `;
                    
                    DOM.floatingContainer.appendChild(el);
                }
            };

            /**
             * Effet machine à écrire récursif
             */
            const typeWriter = (text, element, speed) => {
                return new Promise(resolve => {
                    element.innerHTML = '';
                    element.classList.add('typing-cursor');
                    
                    let i = 0;
                    const type = () => {
                        if (i < text.length) {
                            element.innerHTML += text.charAt(i);
                            i++;
                            setTimeout(type, speed);
                        } else {
                            element.classList.remove('typing-cursor');
                            resolve();
                        }
                    };
                    type();
                });
            };

            /**
             * Fade in Audio en douceur
             */
            const playAudioSmoothly = async () => {
                try {
                    DOM.audio.volume = 0;
                    await DOM.audio.play();
                    
                    let fadeAudio = setInterval(() => {
                        if (DOM.audio.volume < 0.6) { // Max volume 60%
                            DOM.audio.volume = Math.min(DOM.audio.volume + CONFIG.audioFadeStep, 0.6);
                        } else {
                            clearInterval(fadeAudio);
                        }
                    }, 200);
                } catch (error) {
                    console.warn("Autoplay audio bloqué par le navigateur", error);
                }
            };

            /**
             * Séquence de feux d'artifice
             */
            const fireConfetti = () => {
                const duration = 5000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#f43f5e', '#fb7185', '#fda4af', '#ffffff']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#f43f5e', '#fb7185', '#fda4af', '#ffffff']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            };

            /**
             * Séquence principale d'initialisation
             */
            const initSequence = async () => {
                // 1. Audio + disparition écran accueil
                playAudioSmoothly();
                DOM.screen.style.opacity = '0';
                DOM.screen.style.transform = 'scale(1.05)'; // Léger effet de zoom out
                
                setTimeout(() => DOM.screen.remove(), 1000); // Nettoyage du DOM

                // 2. Séquence de texte (Utilisation de async/await très "Senior")
                await new Promise(r => setTimeout(r, 800)); // Pause dramatique
                await typeWriter(CONFIG.texts.intro, DOM.tw1, CONFIG.typingSpeed);
                
                await new Promise(r => setTimeout(r, 500)); // Pause avant le climax
                await typeWriter(CONFIG.texts.main, DOM.tw2, CONFIG.typingSpeed);
                
                // 3. Climax : Effets + Bouton
                DOM.tw2.classList.add('animate-pulse-glow');
                fireConfetti();
                
                // Apparition fluide du bouton
                DOM.btn.classList.remove('opacity-0', 'translate-y-4');
                DOM.btn.classList.add('opacity-100', 'translate-y-0');
            };

            // Setup initial
            generateFloatingElements();

            // API Publique
            return {
                init: initSequence
            };
        })();
    </script>
</body>
</html>
